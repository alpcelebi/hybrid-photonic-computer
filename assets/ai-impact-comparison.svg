<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="hybridBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ffb800"/>
    </linearGradient>
    <linearGradient id="todayBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#444444"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2">AI OPERATIONS: TODAY vs HYBRID PHOTONIC</text>
  <text x="450" y="58" text-anchor="middle" fill="#aaaaaa" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11">Theoretical projections based on photonic computing research</text>

  <!-- Legend -->
  <rect x="490" y="70" width="16" height="10" rx="2" fill="#555555"/>
  <text x="512" y="80" fill="#aaaaaa" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">Today (Binary)</text>
  <rect x="620" y="70" width="16" height="10" rx="2" fill="url(#hybridBar)"/>
  <text x="642" y="80" fill="#aaaaaa" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">Hybrid Photonic</text>

  <!-- Bar chart area -->
  <!-- X-axis label -->
  <text x="450" y="472" text-anchor="middle" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9">← Less is better (lower resource consumption / faster speed)</text>

  <!-- ====== ROW 1: Water Usage ====== -->
  <text x="185" y="112" text-anchor="end" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Water Usage</text>
  <text x="185" y="124" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">per 100 queries</text>
  <!-- Today bar -->
  <rect x="195" y="100" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="111" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">~500ml</text>
  <!-- Hybrid bar -->
  <rect x="195" y="116" width="50" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="127" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">~50ml</text>
  <!-- Improvement badge -->
  <rect x="800" y="100" width="80" height="30" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="1"/>
  <text x="840" y="112" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">90% less</text>
  <text x="840" y="124" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">water</text>

  <!-- ====== ROW 2: Energy Per Query ====== -->
  <text x="185" y="162" text-anchor="end" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Energy / Query</text>
  <text x="185" y="174" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">relative to Google search</text>
  <!-- Today bar: 10× = full ~500px -->
  <rect x="195" y="150" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="161" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">~10× search</text>
  <!-- Hybrid bar: 0.5× = 25px -->
  <rect x="195" y="166" width="25" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="177" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">~0.5× search</text>
  <!-- Badge -->
  <rect x="800" y="150" width="80" height="30" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="1"/>
  <text x="840" y="162" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">95% less</text>
  <text x="840" y="174" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">energy</text>

  <!-- ====== ROW 3: Training Time ====== -->
  <text x="185" y="212" text-anchor="end" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Training Time</text>
  <text x="185" y="224" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">GPT-4 scale model</text>
  <!-- Today bar: 3-4 months = full -->
  <rect x="195" y="200" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="211" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">3–4 months</text>
  <!-- Hybrid bar: 7 days ÷ 120 days ≈ 5.8% = ~29px -->
  <rect x="195" y="216" width="29" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="227" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">3–7 days</text>
  <!-- Badge -->
  <rect x="800" y="200" width="80" height="30" rx="4" fill="#ffb80020" stroke="#ffb800" stroke-width="1"/>
  <text x="840" y="212" text-anchor="middle" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">15–30×</text>
  <text x="840" y="224" text-anchor="middle" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">faster</text>

  <!-- ====== ROW 4: Inference Latency ====== -->
  <text x="185" y="262" text-anchor="end" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Inference Latency</text>
  <text x="185" y="274" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">LLM response time</text>
  <!-- Today bar: 1-5s = full -->
  <rect x="195" y="250" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="261" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">1–5 seconds</text>
  <!-- Hybrid bar: 10ms ÷ 5000ms = 0.2% = ~1px, show at min 8px -->
  <rect x="195" y="266" width="8" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="277" fill="#ffb800" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">&lt;10 milliseconds</text>
  <!-- Badge -->
  <rect x="800" y="250" width="80" height="30" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="1"/>
  <text x="840" y="262" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">98% faster</text>
  <text x="840" y="274" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">response</text>

  <!-- ====== ROW 5: Operating Cost ====== -->
  <text x="185" y="312" text-anchor="end" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Operating Cost</text>
  <text x="185" y="324" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">electricity / day</text>
  <!-- Today bar -->
  <rect x="195" y="300" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="311" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">$50–100K/day</text>
  <!-- Hybrid bar: ~15% of 500 = 75px -->
  <rect x="195" y="316" width="75" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="327" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">$7–15K/day</text>
  <!-- Badge -->
  <rect x="800" y="300" width="80" height="30" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="1"/>
  <text x="840" y="312" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">85% less</text>
  <text x="840" y="324" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">cost</text>

  <!-- ====== ROW 6: Carbon Footprint ====== -->
  <text x="185" y="362" text-anchor="end" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600">Carbon Footprint</text>
  <text x="185" y="374" text-anchor="end" fill="#666666" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">% of global emissions</text>
  <!-- Today bar: 3-4% → 500px full -->
  <rect x="195" y="350" width="500" height="13" rx="3" fill="#444444" opacity="0.7"/>
  <text x="700" y="361" fill="#888888" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">3–4% global emissions</text>
  <!-- Hybrid bar: 0.5% ÷ 4% ≈ 12.5% = 63px -->
  <rect x="195" y="366" width="63" height="13" rx="3" fill="url(#hybridBar)" filter="url(#glow)"/>
  <text x="700" y="377" fill="#00d4ff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10">&lt;0.5% global emissions</text>
  <!-- Badge -->
  <rect x="800" y="350" width="80" height="30" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="1"/>
  <text x="840" y="362" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700">85% less</text>
  <text x="840" y="374" text-anchor="middle" fill="#00ff88" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="8">carbon</text>

  <!-- Row separators -->
  <line x1="195" y1="143" x2="795" y2="143" stroke="#222222" stroke-width="0.5"/>
  <line x1="195" y1="193" x2="795" y2="193" stroke="#222222" stroke-width="0.5"/>
  <line x1="195" y1="243" x2="795" y2="243" stroke="#222222" stroke-width="0.5"/>
  <line x1="195" y1="293" x2="795" y2="293" stroke="#222222" stroke-width="0.5"/>
  <line x1="195" y1="343" x2="795" y2="343" stroke="#222222" stroke-width="0.5"/>

  <!-- Y-axis line -->
  <line x1="195" y1="93" x2="195" y2="390" stroke="#444444" stroke-width="1"/>
  <line x1="195" y1="390" x2="795" y2="390" stroke="#444444" stroke-width="1"/>

  <!-- X-axis ticks -->
  <text x="195" y="403" text-anchor="middle" fill="#444444" font-family="Consolas, monospace" font-size="8">0%</text>
  <text x="320" y="403" text-anchor="middle" fill="#444444" font-family="Consolas, monospace" font-size="8">25%</text>
  <text x="445" y="403" text-anchor="middle" fill="#444444" font-family="Consolas, monospace" font-size="8">50%</text>
  <text x="570" y="403" text-anchor="middle" fill="#444444" font-family="Consolas, monospace" font-size="8">75%</text>
  <text x="695" y="403" text-anchor="middle" fill="#444444" font-family="Consolas, monospace" font-size="8">100%</text>

  <!-- Tick lines -->
  <line x1="320" y1="390" x2="320" y2="395" stroke="#444444" stroke-width="1"/>
  <line x1="445" y1="390" x2="445" y2="395" stroke="#444444" stroke-width="1"/>
  <line x1="570" y1="390" x2="570" y2="395" stroke="#444444" stroke-width="1"/>
  <line x1="695" y1="390" x2="695" y2="395" stroke="#444444" stroke-width="1"/>

  <!-- Footer note -->
  <text x="450" y="490" text-anchor="middle" fill="#555555" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9">Data based on theoretical photonic computing projections · Conceptual architecture by Alp Eren Celebi</text>
</svg>
